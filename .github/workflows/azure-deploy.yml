name: CI/CD Azure Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  AZURE_LOCATION: francecentral
  PROJECT_NAME: capuchesdopale

jobs:
  # Tests + Builds en parallèle
  
  test-backend:
    name:  Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json
      - run: npm ci
        working-directory: ./back
      - run: npm run lint
        working-directory: ./back
        continue-on-error: true
      - run: npm run test
        working-directory: ./back
        continue-on-error: true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      - run: npm ci
        working-directory: ./front
      - run: npm run testCi
        working-directory: ./front
        continue-on-error: true

  build-backend-image:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./back
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/capuchesdopale-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/capuchesdopale-api:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend-image:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/capuchesdopale-web:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/capuchesdopale-web:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-functions:
    name:  Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: azure-functions/package-lock.json
      - run: npm ci && npm run build
        working-directory: ./azure-functions
      - uses: actions/upload-artifact@v4
        with:
          name: functions-build
          path: ./azure-functions
          retention-days: 1

  # PHASE 2: Déploiement Infrastructure Azure
  
  deploy-infrastructure:
    name:  Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build-backend-image, build-frontend-image]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name rg-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }} \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Bicep
        id: deploy_bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          deploymentName: infra-${{ github.run_id }}-${{ github.run_attempt }}
          resourceGroupName: rg-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }}
          template: ./infra/main.bicep
          parameters: >
            projectName=${{ env.PROJECT_NAME }}
            environment=${{ github.event.inputs.environment || 'dev' }}
            location=${{ env.AZURE_LOCATION }}
            sqlAdminUsername=${{ secrets.SQL_ADMIN_USERNAME }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            jwtSecretAdmin=${{ secrets.JWT_SECRET_ADMIN }}
            githubClientId=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
            githubClientSecret=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
            containerRegistryUrl=${{ secrets.ACR_LOGIN_SERVER }}
            containerRegistryUsername=${{ secrets.ACR_USERNAME }}
            containerRegistryPassword=${{ secrets.ACR_PASSWORD }}
            backendImageTag=${{ github.sha }}
            frontendImageTag=${{ github.sha }}
          failOnStdErr: false

      - name: Apply OAuth URLs from Bicep outputs
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-${{ env.PROJECT_NAME }}-${ENV}"
          DEPLOYMENT_NAME="infra-${{ github.run_id }}-${{ github.run_attempt }}"

          FRONTEND_OAUTH_SUCCESS_URL=$(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RG" --query "properties.outputs.frontendOAuthSuccessUrl.value" -o tsv)
          GITHUB_CALLBACK_URL=$(az deployment group show --name "$DEPLOYMENT_NAME" --resource-group "$RG" --query "properties.outputs.githubCallbackUrl.value" -o tsv)

          if [ -z "$FRONTEND_OAUTH_SUCCESS_URL" ] || [ -z "$GITHUB_CALLBACK_URL" ]; then
            echo "Missing OAuth outputs from Bicep deployment"
            exit 1
          fi

          az containerapp update \
            --name "ca-${{ env.PROJECT_NAME }}-${ENV}-api" \
            --resource-group "$RG" \
            --set-env-vars FRONTEND_OAUTH_SUCCESS_URL="$FRONTEND_OAUTH_SUCCESS_URL" GITHUB_CALLBACK_URL="$GITHUB_CALLBACK_URL"

  # Déploiements post-infra en parallèle
  
  deploy-function:
    name:  Deploy Function
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-functions]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-build
          path: ./azure-functions
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: Azure/functions-action@v1
        with:
          app-name: func-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }}
          package: ./azure-functions

  database-migration:
    name:  Database Migration
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json
      - run: npm ci
        working-directory: ./back
      - name: Run Prisma
        working-directory: ./back
        env:
          DATABASE_URL: "sqlserver://sql-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }}.database.windows.net:1433;database=guild-db;user=${{ secrets.SQL_ADMIN_USERNAME }}@sql-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }};password=${{ secrets.SQL_ADMIN_PASSWORD }};encrypt=true;trustServerCertificate=false"
        run: npx prisma generate && npx prisma db push --accept-data-loss
        continue-on-error: true
      - name: Run Database Seed
        working-directory: ./back
        env:
          DATABASE_URL: "sqlserver://sql-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }}.database.windows.net:1433;database=guild-db;user=${{ secrets.SQL_ADMIN_USERNAME }}@sql-${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment || 'dev' }};password=${{ secrets.SQL_ADMIN_PASSWORD }};encrypt=true;trustServerCertificate=false"
        run: npx prisma db seed
        continue-on-error: true

  # Smoke Tests (parallel)

  collect-endpoints:
    name: Collect Endpoints
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    if: always() && needs.deploy-infrastructure.result == 'success'
    outputs:
      backend-direct: ${{ steps.endpoints.outputs.backend_direct }}
      frontend-direct: ${{ steps.endpoints.outputs.frontend_direct }}
      backend-gateway: ${{ steps.endpoints.outputs.backend_gateway }}
      frontend-gateway: ${{ steps.endpoints.outputs.frontend_gateway }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get deployment URLs
        id: endpoints
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          RG="rg-${{ env.PROJECT_NAME }}-$ENV"

          BACKEND_FQDN=$(az containerapp show --name "ca-${{ env.PROJECT_NAME }}-${ENV}-api" --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)
          FRONTEND_FQDN=$(az containerapp show --name "ca-${{ env.PROJECT_NAME }}-${ENV}-web" --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)

          AGW_NAME="agw-${{ env.PROJECT_NAME }}-${ENV}"
          AGW_IP=$(az network public-ip show --name "pip-$AGW_NAME" --resource-group "$RG" --query "ipAddress" -o tsv)

          echo "backend_direct=https://$BACKEND_FQDN" >> $GITHUB_OUTPUT
          echo "frontend_direct=https://$FRONTEND_FQDN" >> $GITHUB_OUTPUT
          echo "backend_gateway=http://$AGW_IP/api" >> $GITHUB_OUTPUT
          echo "frontend_gateway=http://$AGW_IP" >> $GITHUB_OUTPUT

  smoke-backend-direct:
    name: Smoke Backend (Direct)
    runs-on: ubuntu-latest
    needs: [collect-endpoints]
    steps:
      - name: Test backend direct health
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ needs.collect-endpoints.outputs.backend-direct }}/api/health
          max-attempts: 5
          retry-delay: 10s
          follow-redirect: true

  smoke-frontend-direct:
    name: Smoke Frontend (Direct)
    runs-on: ubuntu-latest
    needs: [collect-endpoints]
    steps:
      - name: Test frontend direct
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ needs.collect-endpoints.outputs.frontend-direct }}
          max-attempts: 5
          retry-delay: 10s
          follow-redirect: true

  smoke-backend-gateway:
    name: Smoke Backend (Gateway)
    runs-on: ubuntu-latest
    needs: [collect-endpoints]
    steps:
      - name: Test backend via gateway
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ needs.collect-endpoints.outputs.backend-gateway }}/health
          max-attempts: 5
          retry-delay: 10s
          follow-redirect: true

  smoke-frontend-gateway:
    name: Smoke Frontend (Gateway)
    runs-on: ubuntu-latest
    needs: [collect-endpoints]
    steps:
      - name: Test frontend via gateway
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ needs.collect-endpoints.outputs.frontend-gateway }}
          max-attempts: 5
          retry-delay: 10s
          follow-redirect: true

  smoke-database:
    name: Smoke BDD
    runs-on: ubuntu-latest
    needs: [collect-endpoints, database-migration]
    if: always() && needs.database-migration.result != 'failure'
    steps:
      - name: Test DB health endpoint
        uses: jtalk/url-health-check-action@v4
        with:
          url: ${{ needs.collect-endpoints.outputs.backend-direct }}/api/health/db
          max-attempts: 5
          retry-delay: 10s
          follow-redirect: true

  smoke-summary:
    name: Smoke Summary
    runs-on: ubuntu-latest
    needs: [collect-endpoints, smoke-backend-direct, smoke-frontend-direct, smoke-backend-gateway, smoke-frontend-gateway, smoke-database]
    if: always() && needs.collect-endpoints.result == 'success'
    steps:
      - name: Generate Summary
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Deployment Complete ($ENV)

          | Test | URL | Result |
          |------|-----|--------|
          | Backend direct | ${{ needs.collect-endpoints.outputs.backend-direct }}/api/health | ${{ needs.smoke-backend-direct.result }} |
          | Frontend direct | ${{ needs.collect-endpoints.outputs.frontend-direct }} | ${{ needs.smoke-frontend-direct.result }} |
          | Backend gateway | ${{ needs.collect-endpoints.outputs.backend-gateway }}/health | ${{ needs.smoke-backend-gateway.result }} |
          | Frontend gateway | ${{ needs.collect-endpoints.outputs.frontend-gateway }} | ${{ needs.smoke-frontend-gateway.result }} |
          | BDD | ${{ needs.collect-endpoints.outputs.backend-direct }}/api/health/db | ${{ needs.smoke-database.result }} |
          EOF

